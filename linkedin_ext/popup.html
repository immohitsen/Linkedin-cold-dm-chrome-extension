<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="container">
      <h2>LinkedIn DM Generator</h2>
      
      <div class="form-group">
        <label for="length">Message Length</label>
        <select id="length">
          <option value="short">Short (< 50 words)</option>
          <option value="medium">Medium (50-100 words)</option>
          <option value="long">Long (> 100 words)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="style">Tone / Style</label>
        <select id="style">
          <option value="professional">Professional</option>
          <option value="casual">Casual / Friendly</option>
          <option value="direct">Direct & Pitch</option>
          <option value="enthusiastic">Enthusiastic</option>
        </select>
      </div>

      <div class="form-group">
        <label for="context">Context / Why reaching out?</label>
        <textarea id="context" placeholder="e.g., Saw their post on AI, hiring for a Frontend Dev..." rows="3"></textarea>
      </div>
      
      <button id="generateBtn">Generate & Send DM</button>
      
      <div id="status" class="status-message"></div>
      
      <div class="footer">
        <!-- Settings link removed since key is hardcoded -->
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
